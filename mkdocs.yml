site_name: 夜独整合包 Wiki
site_description: 博德之门3 MOD整合包攻略站
site_author: 在下夜独
site_url: https://oiclyd.github.io/bg3-mod-wiki

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  favicon: assets/images/favicon.png
  features:
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  custom_dir: overrides
  extra_css:
    - stylesheets/extra.css

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - 首页: index.md
  - 新手入门: ch1-start.md
  - MOD工具与教程: ch2-mod.md
  - 常见问题汇总: ch3-faq.md
  - 职业攻略: ch4-class.md
  - 种族攻略: ch6-race.md
  - 专长攻略: ch7-divinity.md
  - 装备攻略: ch8-equip.md
  - 召唤攻略:
    - 概览: ch9-summon.md
    - 进化的弗林德: ch9-flind.md
    - 进化的伯纳德: ch9-bernard.md
    - 进化的小趴铲: ch9-shovel.md
    - 进化的长牙: ch9-tusk.md
    - 进化的萨扎: ch9-sazza.md
    - 进化的波尼: ch9-squire.md
    - 进化的挠挠: ch9-scratch.md
    - 进化的普德利普: ch9-pooldripp.md
    - 进化的塔拉: ch9-tara.md
    - 进化的枭熊: ch9-owlbear.md
    - 进化的科斯: ch9-quothe.md
    - 进化的我们: ch9-us.md
    - 进化的布布: ch9-boo.md
  - 自选模组说明: ch10-mod.md
  - 难度攻略: ch11-difficulty.md
  - 炼金术: ch12-alchemy.md

extra:
  social:
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/
      name: B站主页
  generator: false

copyright: |
