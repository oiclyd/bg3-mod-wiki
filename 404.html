    document.addEventListener("DOMContentLoaded", function() {
      // 无自定义标题的提示框：隐藏整个标题栏
      document.querySelectorAll(".md-typeset .admonition > .admonition-title").forEach(function(el) {
        // MkDocs Material 9.x 生成的默认标题只有英文单词（如 "Tip", "Danger"）
        // 有自定义标题的会包含中文或其他内容
        var text = el.textContent.trim();
        var defaultTitles = ["Tip", "Note", "Warning", "Danger", "Info", "Success", "Failure", "Bug", "Abstract", "Question", "Example", "Quote", "Cite"];
        if (defaultTitles.indexOf(text) !== -1) {
          el.style.display = "none";
        }
      });

      var titleMap = {
        "Tip": "提示",

        "Warning": "警告",
        "Danger": "危险",
        "Info": "信息",
        "Success": "成功",
